<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4단원. 갈등을 푸는 지혜 - 02. 토의하기</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 플래시 카드 3D 효과 */
    .perspective-1000 {
      perspective: 1000px;
    }
    .preserve-3d {
      transform-style: preserve-3d;
    }
    .backface-hidden {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .rotate-y-180 {
      transform: rotateY(180deg);
    }
    /* 모달 및 스크롤바 커스텀 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen text-gray-800 font-sans antialiased">

  <!-- 메인 앱 컨테이너 -->
  <div class="min-h-screen p-6 md:p-12">
    
    <!-- 헤더 섹션 -->
    <header class="max-w-4xl mx-auto mb-10 text-center">
      <span class="inline-block py-1 px-3 rounded-full bg-blue-100 text-blue-800 font-bold text-sm mb-3">
        중학 국어 1-1 (박현숙)
      </span>
      <h1 class="text-3xl md:text-5xl font-extrabold text-gray-900 mb-4 tracking-tight leading-tight">
        4단원. 갈등을 푸는 지혜 <br/> 
        <span class="text-blue-600">02. 토의하기</span>
      </h1>
      <p class="text-gray-500 text-lg">
        아래의 학습 카드를 클릭하여 토의의 개념과 절차를 완벽하게 이해해 보세요!
      </p>
    </header>

    <!-- 카드 그리드 섹션 -->
    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6" id="cards-grid">
      <!-- 동적 카드 목록이 자바스크립트로 렌더링됩니다. -->
    </main>

  </div>

  <!-- 공통 학습 모달 (개념, 어휘, 절차, 참여자 역할, 퀴즈 공용) -->
  <div id="learning-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <!-- 백그라운드 오버레이 -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onclick="closeLearningModal()"></div>
    
    <!-- 모달 콘텐츠 박스 -->
    <div class="relative bg-white w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden transform scale-95 opacity-0 transition-all duration-200" id="learning-modal-content">
      <!-- 모달 헤더 -->
      <div id="modal-header" class="px-6 py-4 flex justify-between items-center text-white">
        <h2 id="modal-title" class="text-2xl font-bold flex items-center gap-2">
          <!-- 타이틀 영역 -->
        </h2>
        <button onclick="closeLearningModal()" class="hover:bg-white/20 p-2 rounded-full transition-colors" aria-label="닫기">
          <!-- Close Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      
      <!-- 모달 본문 (스크롤 가능) -->
      <div id="modal-body" class="p-6 md:p-8 max-h-[75vh] overflow-y-auto custom-scrollbar">
        <!-- 동적 내부 콘텐츠 탑재 -->
      </div>
    </div>
  </div>

  <!-- 동영상 재생 모달 -->
  <div id="video-modal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 hidden">
    <!-- 백그라운드 오버레이 -->
    <div class="absolute inset-0 bg-black/80 backdrop-blur-sm transition-opacity" onclick="closeVideoModal()"></div>
    
    <!-- 동영상 플레이어 박스 -->
    <div class="relative w-full max-w-4xl bg-white rounded-2xl shadow-2xl overflow-hidden transform scale-95 opacity-0 transition-all duration-200 flex flex-col" id="video-modal-content">
      
      <!-- 모달 헤더 (비디오 타이틀 및 닫기 버튼) -->
      <div class="bg-indigo-600 px-6 py-4 flex justify-between items-center text-white shrink-0">
        <h2 class="text-xl font-bold flex items-center gap-2">
          <span>🎬</span> 여러 가지 토의 유형 동영상 학습
        </h2>
        <button onclick="closeVideoModal()" class="hover:bg-white/20 p-2 rounded-full transition-colors" aria-label="닫기">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <!-- 동영상 영역 -->
      <div class="p-6 bg-slate-900 flex-1 flex flex-col gap-4">
        <div class="aspect-video bg-gray-950 w-full rounded-xl overflow-hidden relative border border-slate-700">
          <!-- 사용자 링크 동영상 렌더링용 Iframe -->
          <iframe id="tutorial-video" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
        
        <!-- 동영상 바로보기 보조 및 대체 컨트롤러 -->
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 bg-slate-800 p-4 rounded-xl border border-slate-700">
          <div class="text-left">
            <p class="text-white font-bold text-sm">💡 동영상이 보이지 않거나 재생되지 않나요?</p>
            <p class="text-gray-400 text-xs mt-1">네트워크 환경이나 학교 보안 방화벽 정책에 의해 블록되었을 경우 아래 링크를 눌러주세요.</p>
          </div>
          <a href="http://v-sam.com/GJ3MHC" target="_blank" class="w-full sm:w-auto px-5 py-2.5 bg-blue-600 text-white font-bold text-sm rounded-lg hover:bg-blue-700 transition-colors shadow-md flex items-center justify-center gap-2 whitespace-nowrap">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
            새 창에서 영상 시청하기
          </a>
        </div>
      </div>
    </div>
  </div>


  <!-- 자바스크립트 비즈니스 로직 -->
  <script>
    // --- 글로벌 어휘 데이터 ---
    const vocabData = [
      {
        word: '협력',
        meaning: '힘을 합하여 서로 도움.',
        example: '문제를 협력하여 해결하려면 어떻게 해야 할까?',

      },
      {
        word: '대안',
        meaning: '어떤 일에 대처할 방안.',
        example: '이러한 상황에서 서로 어떻게 의견을 나누고, 대안을 마련해야 하는지 알아볼까?',

      {

        myExample: '모든 사람은 서로 다르기 때문에 각자의 개성을 존중해야 한다.'
      },
      {

        myExample: '판사는 자신의 판결에 최대한 공평을 기해야 한다.'
      },
      {
        word: '조정',
        meaning: '분쟁을 중간에서 화해하게 하거나 서로 타협점을 찾아 합의하도록 함.',
        example: '상대방의 생각을 존중하며 서로 다른 의견을 조정해 본 적이 있어.',
        myExample: '문제를 해결하기 위해 관련된 사람들이 모두 모여 직접 조정에 나섰다.'
      },
      {
        word: '유도',
        meaning: '사람이나 물건을 목적한 장소나 방향으로 이끎.',
        example: '정부는 응징보다는 대화 유도에 더 힘을 기울였다.',
        myExample: '나는 계속 칭찬을 하여 그가 좋은 행동을 하도록 유도했다.'
      }
    ];

    // --- 글로벌 퀴즈 상태 ---
    let quizShowAnswers = false;

    // --- 어휘 카드 상태 ---
    let currentCardIndex = 0;
    let isFlipped = false;

    // --- 토의 절차 상태 ---
    let activeProcedureStep = 1;

    // --- SVG 아이콘 문자열 정의 ---
    const BookIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>`;
    const WordIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-green-500"><path d="m4 7 2-2"></path><path d="m4 17 2 2"></path><path d="M7 4l-2 2"></path><path d="M7 20l-2-2"></path><path d="M20 7l-2-2"></path><path d="M20 17l-2 2"></path><path d="M17 4l2 2"></path><path d="M17 20l2-2"></path><path d="M12 2v20"></path><path d="M2 12h20"></path></svg>`;
    const ListIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-teal-500"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>`;
    const UsersIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-purple-500"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>`;
    const QuizIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-orange-500"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="m9 15 2 2 4-4"></path></svg>`;

    // --- 메인 카드 데이터 정의 ---
    const cardsData = [
      {
        id: 'concept',
        title: '토의의 개념과 유형',
        description: '토의란 무엇이고 어떤 유형이 있을까요? 개념과 종류를 알아봅시다.',
        icon: BookIcon,
        color: 'bg-blue-500',
        textColor: 'text-blue-500'
      },
      {
        id: 'vocab',
        title: '어휘 학습 카드',
        description: '단원 학습에 필요한 핵심 어휘 6가지를 익혀보세요.',
        icon: WordIcon,
        color: 'bg-green-500',
        textColor: 'text-green-500'
      },
      {
        id: 'procedure',
        title: '토의의 일반적인 절차',
        description: '토의는 어떤 순서로 진행될까요? 교실 자리 배치 예시를 통해 알아봅시다.',
        icon: ListIcon,
        color: 'bg-teal-500',
        textColor: 'text-teal-500'
      },
      {
        id: 'roles',
        title: '참여자의 역할과 태도',
        description: '사회자, 토의자, 청중은 각각 어떤 역할을 해야 할까요?',
        icon: UsersIcon,
        color: 'bg-purple-500',
        textColor: 'text-purple-500'
      },
      {
        id: 'quiz',
        title: '실력 점검 쪽지 시험',
        description: '지금까지 배운 내용을 퀴즈를 통해 확인해 봅시다.',
        icon: QuizIcon,
        color: 'bg-orange-500',
        textColor: 'text-orange-500'
      }
    ];

    // --- 초기화 및 실행 ---
    window.onload = function() {
      renderCards();
    };

    // --- 카드 렌더링 ---
    function renderCards() {
      const grid = document.getElementById('cards-grid');
      grid.innerHTML = '';

      cardsData.forEach(card => {
        const cardBtn = document.createElement('button');
        cardBtn.className = 'group relative bg-white p-6 rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 text-left border border-gray-100 overflow-hidden focus:outline-none';
        cardBtn.onclick = () => openLearningModal(card.id);

        cardBtn.innerHTML = `
          <div class="absolute top-0 left-0 w-2 h-full ${card.color}"></div>
          <div class="flex items-start justify-between gap-4 w-full">
            <div>
              <h3 class="text-xl font-bold text-gray-800 mb-2 group-hover:text-blue-600 transition-colors">
                ${card.title}
              </h3>
              <p class="text-gray-500 leading-snug text-sm">
                ${card.description}
              </p>
            </div>
            <div class="bg-gray-50 p-3 rounded-full group-hover:bg-blue-50 transition-colors shrink-0">
              ${card.icon}
            </div>
          </div>
          <div class="mt-4 flex items-center text-sm font-semibold text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity">
            학습하기 <span class="ml-1">→</span>
          </div>
        `;
        grid.appendChild(cardBtn);
      });
    }

    // --- 학습 모달 열기 ---
    function openLearningModal(cardId) {
      const targetCard = cardsData.find(c => c.id === cardId);
      if (!targetCard) return;

      const modal = document.getElementById('learning-modal');
      const contentBox = document.getElementById('learning-modal-content');
      const header = document.getElementById('modal-header');
      const title = document.getElementById('modal-title');
      const body = document.getElementById('modal-body');

      // 헤더 스타일링 및 타이틀 반영
      header.className = `${targetCard.color} px-6 py-4 flex justify-between items-center text-white`;
      title.innerHTML = `
        <span class="bg-white/20 p-1.5 rounded-lg flex items-center justify-center">${targetCard.icon}</span>
        <span>${targetCard.title}</span>
      `;

      // 본문 내용 셋팅
      body.innerHTML = getModalContentHTML(cardId);

      // 모달 표시 에러 방지용 프레임 조정 후 오픈 애니메이션
      modal.classList.remove('hidden');
      setTimeout(() => {
        contentBox.classList.remove('scale-95', 'opacity-0');
        contentBox.classList.add('scale-100', 'opacity-100');
      }, 50);

      // 모달 별 로직 핸들링
      if (cardId === 'vocab') {
        currentCardIndex = 0;
        isFlipped = false;
        renderFlashcard();
      } else if (cardId === 'procedure') {
        activeProcedureStep = 1;
        renderProcedureStep();
      }
    }

    // --- 학습 모달 닫기 ---
    function closeLearningModal() {
      const modal = document.getElementById('learning-modal');
      const contentBox = document.getElementById('learning-modal-content');

      contentBox.classList.remove('scale-100', 'opacity-100');
      contentBox.classList.add('scale-95', 'opacity-0');

      setTimeout(() => {
        modal.classList.add('hidden');
      }, 200);
    }

    // --- 콘텐츠 HTML 빌더 ---
    function getModalContentHTML(id) {
      switch (id) {
        case 'concept':
          return `
            <div class="space-y-4">
              <div class="bg-blue-50 p-4 rounded-xl border-l-4 border-blue-500">
                <h4 class="font-bold text-xl text-blue-800 mb-2">토의(討議)란?</h4>
                <p class="text-gray-700 leading-relaxed">
                  공동의 문제를 해결하기 위해 여러 사람이 의견이나 생각을 주고받는 <strong>협력적인 말하기</strong>입니다.
                </p>
              </div>
              
              <div class="bg-indigo-50 p-4 rounded-xl border-l-4 border-indigo-500 mt-4">
                <h4 class="font-bold text-xl text-indigo-800 mb-2">토의의 대표적인 유형</h4>
                <div class="space-y-3 mt-3">
                  <div class="bg-white p-4 rounded-lg shadow-sm border border-indigo-100">
                    <h5 class="font-bold text-indigo-700 text-lg flex items-center gap-2">
                      <span>💬</span> 원탁 토의
                    </h5>
                    <p class="text-gray-700 mt-2 leading-relaxed">
                      참여자 모두가 <strong>대등한 관계에서 자유롭게</strong> 의견을 나누는 토의 방식이에요. 마치 둥근 탁자에 둘러앉아 이야기하듯 편안한 분위기에서 진행되며, 학급 회의나 모둠 회의에서 주로 쓰여요.
                    </p>
                  </div>
                  <div class="bg-white p-4 rounded-lg shadow-sm border border-indigo-100">
                    <h5 class="font-bold text-indigo-700 text-lg flex items-center gap-2">
                      <span>🎤</span> 패널 토의
                    </h5>
                    <p class="text-gray-700 mt-2 leading-relaxed">
                      특정 주제에 대해 서로 다른 의견이나 지식을 가진 <strong>소수의 대표자(패널)</strong>들이 청중 앞에서 먼저 토의를 하고, 나중에 청중과 질의응답을 하는 방식이에요. 보통 TV 프로그램이나 강연에서 자주 볼 수 있어요.
                    </p>
                  </div>
                </div>

                <!-- 동영상 팝업 버튼 -->
                <button 
                  onclick="openVideoModal()" 
                  class="mt-4 w-full py-3 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition-colors flex items-center justify-center gap-2 shadow-md focus:outline-none"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                  여러 가지 토의 유형 동영상 보기
                </button>
              </div>

              <div class="bg-blue-50 p-4 rounded-xl border-l-4 border-blue-500 mt-4">

                <p class="text-gray-700">가장 공평한 방법이지만, 키가 너무 작거나 시력이 나쁜 친구들이 뒷자리에 뽑히면 수업에 참여하기 힘들다는 단점이 있어. <strong>이를 보완하기 위한 특수석(시력 배려석)을 일부 따로 마련하자</strong>는 수정 보완 아이디어가 도출되었어!</p>
              </div>
            </div>
          </div>
        `
      },
      4: {
        title: "4단계: 토의 내용 정리하기",
        desc: "토의의 전 과정을 종합하고, 합리적으로 도출된 최종 해결 방안을 명확하게 선언해요.",
        target: "🏆 최종 결정 사항",
        bg: "bg-teal-100/50",
        detailHTML: `
          <div class="space-y-4">
            <div class="bg-white p-4 rounded-xl border-2 border-teal-400 shadow-md">
              <h5 class="font-bold text-teal-800 text-base mb-2">🎉 토의 결과 합의안</h5>
              <ol class="list-decimal pl-5 text-sm text-gray-700 space-y-2 leading-relaxed">
                <li>우리 반 자리는 모두에게 기회가 공평하게 주어지는 <strong>추첨(제비뽑기) 방식</strong>으로 선정한다.</li>
                <li>단, 시력이 나쁘거나 키 등을 고려해 앞자리에 앉아야 하는 친구들의 자리는 추첨 전 <strong>우선적으로 먼저 배정</strong>하기로 배려한다.</li>
                <li>자리 배치 주기 및 구체적인 예외 상황 대처법 같은 세부 운영 규칙은 <strong>다음 시간에 구체적으로 토의하여 확정</strong>하기로 약속하고 오늘의 토의를 마무리한다.</li>
              </ol>
            </div>

            <div class="bg-gray-100 p-3 rounded-lg text-center text-xs text-gray-600 font-semibold">
              📌 사회자의 요약 정리: "여러분 모두 합리적인 근거를 제시하고 서로 양보해 주신 덕분에, 공평하면서도 친구를 배려할 수 있는 훌륭한 자립 방안을 도출했습니다!"
            </div>
          </div>
        `
      }
    };

    function renderProcedureStep() {
      // 1. 모든 버튼 스타일 일괄 정리
      for (let i = 1; i <= 4; i++) {
        const btn = document.getElementById(`step-btn-${i}`);
        const numBadge = document.getElementById(`step-num-${i}`);
        
        if (i === activeProcedureStep) {
          // 활성화 스타일 적용
          btn.className = "py-3 px-1 rounded-xl font-bold text-xs md:text-sm transition-all duration-300 border flex flex-col items-center justify-center gap-1 focus:outline-none bg-teal-500 text-white border-teal-600 shadow-md scale-105";
          numBadge.className = "w-5 h-5 rounded-full flex items-center justify-center text-xs font-black bg-white text-teal-600";
        } else {
          // 비활성 스타일 적용
          btn.className = "py-3 px-1 rounded-xl font-bold text-xs md:text-sm transition-all duration-300 border flex flex-col items-center justify-center gap-1 focus:outline-none bg-white text-gray-500 border-gray-200 hover:bg-teal-50";
          numBadge.className = "w-5 h-5 rounded-full flex items-center justify-center text-xs font-black bg-gray-200 text-gray-600";
        }
      }

      // 2. 카드 콘텐츠 전환 애니메이션 및 반영
      const container = document.getElementById('step-detail-container');
      const title = document.getElementById('step-title');
      const badge = document.getElementById('step-badge');
      const desc = document.getElementById('step-desc');
      const body = document.getElementById('step-body-content');

      const data = stepsInfo[activeProcedureStep];

      // 배경색 동적 리셋
      container.className = `p-5 md:p-6 rounded-2xl border border-teal-100 shadow-sm transition-all duration-300 ${data.bg}`;
      
      // 글자 탑재
      title.innerText = data.title;
      badge.innerText = data.target;
      desc.innerText = data.desc;
      body.innerHTML = data.detailHTML;
    }

    function changeProcedureStep(step) {
      activeProcedureStep = step;
      renderProcedureStep();
    }

    // --- 퀴즈 점검 토글 처리 ---
    function toggleQuizAnswers() {
      quizShowAnswers = !quizShowAnswers;
      
      const oAnses = document.querySelectorAll('.quiz-ans');
      const blanks = document.querySelectorAll('.quiz-blank');
      const actionBtn = document.getElementById('quiz-action-btn');

      if (quizShowAnswers) {
        // 정답 공개 처리
        oAnses.forEach(item => {
          item.classList.remove('text-transparent');
          item.classList.add('text-red-500');
        });
        blanks.forEach(item => {
          item.classList.remove('text-transparent');
          item.classList.add('text-red-500');
        });
        actionBtn.innerText = '정답 숨기기';
      } else {
        // 정답 가림 처리
        oAnses.forEach(item => {
          item.classList.remove('text-red-500');
          item.classList.add('text-transparent');
        });
        blanks.forEach(item => {
          item.classList.remove('text-red-500');
          item.classList.add('text-transparent');
        });
        actionBtn.innerText = '정답 확인하기';
      }
    }
  </script>
</body>
</html>
